            }
            if (++frame_skip < id(effect_speed)) return;
            frame_skip = 0;

            if (progress < it.size()) {
              for (uint16_t i = 0; i < GROUP_SIZE; i++) {
                uint16_t idx = it.size() - progress - i - 1;
                if (idx < it.size()) it[idx] = Color::BLACK;
              }
              progress += GROUP_SIZE;
              effect_complete = false;
            } else {
              effect_complete = true;
            }
            id(effect_finished) = effect_complete;

      # ==========================================================
      # BUILT-IN EFFECTS
      # ==========================================================
      - addressable_color_wipe:
          name: forward wipe
          colors:
            - red: 100%
              green: 100%
              blue: 100%
              num_leds: 5
              gradient: true
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 1
          add_led_interval: 100ms
          reverse: false

      - addressable_color_wipe:
          name: rev wipe
          colors:
            - red: 100%
              green: 100%
              blue: 100%
              num_leds: 5
              gradient: true
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 1
          add_led_interval: 100ms
          reverse: true

      - addressable_rainbow:
          name: Rainbow Effect With Custom Values
          speed: 10
          width: 50

      - pulse:
          name: "Pulse"
          transition_length: 0.5s
          update_interval: 0.5s

      # ==========================================================
      # EASTER EGG EFFECTS
      # CHANGE: All now clear special_effect_active on completion
      # ==========================================================
      - addressable_lambda:
          name: "Disco Mode"
          update_interval: 200ms
          lambda: |-
            static uint8_t hue = 0;
            static uint32_t disco_start_time = 0;

            if (initial_run) {
              hue = 0;
              disco_start_time = millis();
              it.all() = ESPHSVColor(0, 255, 150);
              return;
            }

            if (millis() - disco_start_time > 10000) {
              it.all() = Color::BLACK;
              id(disco_mode_active) = false;
              id(disco_trigger_count) = 0;
              id(last_disco_trigger_time) = 0;
              id(system_state) = 0;
              id(special_effect_active) = false;  // Release mutex
              id(stair_light).turn_off();
              return;
            }

            hue += 30;
            for (int i = 0; i < it.size(); i++) {
              uint8_t local_hue = (hue + (i * 10)) % 255;
              it[i] = ESPHSVColor(local_hue, 255, 150);
            }

      - addressable_lambda:
          name: "Fire Flicker"
          update_interval: 100ms
          lambda: |-
            static uint32_t start_time = 0;
            if (initial_run) {
              start_time = millis();
              it.all() = ESPHSVColor(20, 255, 100);
              return;
            }
            if (millis() - start_time > 15000) {
              it.all() = Color::BLACK;
              id(special_effect_active) = false;  // Release mutex
              id(stair_light).turn_off();
              return;
            }
            for (int i = 0; i < it.size(); i++) {
              int flicker = random(0, 100);
              it[i] = ESPHSVColor(20, 255, 100 + flicker);
            }

      - addressable_lambda:
          name: "Moonlight"
          update_interval: 500ms
          lambda: |-
            static uint32_t start_time = 0;
            static uint8_t brightness = 50;
            static bool increasing = true;
            if (initial_run) {
              start_time = millis();
              brightness = 50;
              increasing = true;
              return;
            }
            if (millis() - start_time > 30000) {
              it.all() = Color::BLACK;
              id(special_effect_active) = false;  // Release mutex
              id(stair_light).turn_off();
              return;
            }
            if (increasing) {
              brightness += 10;
              if (brightness >= 150) increasing = false;
            } else {
              brightness -= 10;
              if (brightness <= 50) increasing = true;
            }
            it.all() = ESPHSVColor(220, 255, brightness);

      # ==========================================================
      # DECORATIVE / DEMO EFFECTS
      # ==========================================================
      - addressable_lambda:
          name: "Breathing Trail"
          update_interval: 100ms
          lambda: |-
            static int lead_pos = 0;
            static uint8_t breathe = 100;
            static bool increasing = true;
            static bool going_up = true;
            if (initial_run) {
              // CHANGE: uses system_state instead of up_sequence_active
              going_up = (id(system_state) == 1);
              lead_pos = going_up ? 0 : it.size() - 1;
              breathe = 100;
              increasing = true;
              it.all() = Color::BLACK;
              return;
            }
            it.all() = Color::BLACK;
            if (increasing) {
              breathe += 20;
              if (breathe >= 200) increasing = false;
            } else {
              breathe -= 20;
              if (breathe <= 100) increasing = true;
            }
            if (lead_pos >= 0 && lead_pos < it.size())
              it[lead_pos] = ESPHSVColor(120, 255, breathe);
            for (int i = 1; i < 5; i++) {
              int trail_pos = going_up ? lead_pos - i : lead_pos + i;
              if (trail_pos >= 0 && trail_pos < it.size())
                it[trail_pos] = ESPHSVColor(120, 255, 50);
            }
            if (going_up) {
              lead_pos++;
              if (lead_pos >= it.size()) id(effect_finished) = true;
            } else {
              lead_pos--;
              if (lead_pos < 0) id(effect_finished) = true;
            }

      - addressable_lambda:
          name: "Step Highlight"
          update_interval: 200ms
          lambda: |-
            static uint8_t brightness = 0;
            static bool fading_in = true;
            const uint16_t leds_per_step = 10;
            if (initial_run) {
              brightness = 0; fading_in = true;
              it.all() = Color::BLACK;
              return;
            }
            if (fading_in) {
              brightness += 20;
              if (brightness >= 200) fading_in = false;
            } else {
              if (brightness >= 20) brightness -= 20; else { brightness = 0; fading_in = true; }
            }
            for (int i = 0; i < it.size(); i += leds_per_step)
              for (int j = 0; j < leds_per_step && (i + j) < it.size(); j++)
                it[i + j] = ESPHSVColor(40, 100, brightness);
            id(effect_finished) = false;

      - addressable_lambda:
          name: "Wave Runner"
          update_interval: 50ms
          lambda: |-
            static int position = 0;
            static bool going_up = true;
            if (initial_run) {
              position = 0;
              // CHANGE: uses system_state instead of up_sequence_active
              going_up = (id(system_state) == 1);
              it.all() = Color::BLACK;
              return;
            }
            it.all() = Color::BLACK;
            // CHANGE: uses preset color instead of hardcoded cyan
            it[position] = ESPHSVColor(id(preset_h), id(preset_s), id(preset_v));
            if (going_up) {
              position++;
              if (position >= it.size() - 1) going_up = false;
            } else {
              position--;
              if (position <= 0) going_up = true;
            }
            id(effect_finished) = false;

      - addressable_lambda:
          name: "Step Forward-Back Pattern"
          update_interval: 100ms
          lambda: |-
            static int step = 0;
            static int cycle = 0;
            static int start_pos = 0;
            static int leds_to_light = 1;
            static bool turning_off = false;

            for (int i = 0; i < it.size(); i++) it[i] = Color(0, 0, 0);

            int end_pos = start_pos + leds_to_light;
            if (end_pos > it.size()) end_pos = it.size();

            if (!turning_off) {
              for (int i = start_pos; i < end_pos && i < it.size(); i++)
                it[i] = Color(255, 255, 255);
              cycle++;
              if (cycle >= leds_to_light) { turning_off = true; cycle = 0; }
            } else {
              int off_count = leds_to_light - cycle - 1;
              for (int i = start_pos; i < end_pos - off_count && i < it.size(); i++)
                it[i] = Color(255, 255, 255);
              cycle++;
              if (cycle >= leds_to_light - 1) {
                turning_off = false; cycle = 0;
                start_pos++; leds_to_light++;
                if (start_pos >= it.size() || leds_to_light > it.size()) {
                  start_pos = 0; leds_to_light = 1;
                }
              }
            }
            step++;

      # ==========================================================
      # FADE CONTROL (legacy single-LED unified version)
      # ==========================================================
      - addressable_lambda:
          name: "Fade Control"
          update_interval: 100ms
          lambda: |-
            static uint16_t progress = 0;
            static bool effect_complete = false;
            static uint8_t frame_skip = 0;

            if (initial_run) {
              progress = 0; effect_complete = false; frame_skip = 0;
              it.all() = Color::BLACK;
              return;
            }
            if (++frame_skip < id(effect_speed)) return;
            frame_skip = 0;

            // CHANGE: reads from preset globals instead of static colors
            ESPHSVColor target = id(fade_on)
              ? ESPHSVColor(id(preset_h), id(preset_s), id(preset_v))
              : ESPHSVColor(0, 0, 0);
            uint16_t group_size = id(led_group_size);

            if (progress < it.size()) {
              if (id(fade_direction_up)) {
                for (uint16_t i = 0; i < group_size && (progress + i) < it.size(); i++)
                  it[progress + i] = target;
              } else {
                for (uint16_t i = 0; i < group_size; i++) {
                  int idx = it.size() - progress - i - 1;
                  if (idx >= 0 && idx < it.size()) it[idx] = target;
                }
              }
              progress += group_size;
              effect_complete = false;
            } else {
              effect_complete = true;
            }
            id(effect_finished) = effect_complete;

      # ==========================================================
      # FADE CONTROL V2 (PRIMARY EFFECT — section-aware)
      #
      # Sections:
      #   sec1 (LEDs  0-15):  16 LEDs  — stair color preset
      #   sec2+3 (LEDs 16-51): 36 LEDs — platform color preset
      #   sec4 (LEDs 52-57):   6 LEDs  — stair color preset
      #
      # CHANGES:
      #   - Colors read dynamically from preset_h/s/v and
      #     platform_h/s/v globals (not static — changes live)
      #   - Frame-skip speed control via effect_speed global
      # ==========================================================
      - addressable_lambda:
          name: "Fade Control V2"
          update_interval: 140ms
          lambda: |-
            static uint16_t progress = 0;
            static bool effect_complete = false;
            static uint8_t frame_skip = 0;

            if (initial_run) {
              progress = 0; effect_complete = false; frame_skip = 0;
              it.all() = Color::BLACK;
              return;
            }

            // Speed control: skip frames to slow down the effect
            if (++frame_skip < id(effect_speed)) return;
            frame_skip = 0;

            // Read colors dynamically — not static, so preset changes apply immediately
            ESPHSVColor on_color      = ESPHSVColor(id(preset_h),    id(preset_s),    id(preset_v));
            ESPHSVColor platform_color = ESPHSVColor(id(platform_h), id(platform_s), id(platform_v));
            ESPHSVColor off_color      = ESPHSVColor(0, 0, 0);
            ESPHSVColor target         = id(fade_on) ? on_color      : off_color;
            ESPHSVColor plat_target    = id(fade_on) ? platform_color : off_color;

            uint16_t group_size      = id(led_group_size);
            uint16_t sec23_group_size = id(led_platform_group_size);

            // Section boundaries (0-based)
            const uint16_t sec1_start = 0;
            const uint16_t sec2_start = 16;
            const uint16_t sec4_start = 52;
            const uint16_t sec1_size  = 16;
            const uint16_t sec23_size = 36;
            const uint16_t sec4_size  = 6;

            if (progress < it.size()) {
              if (id(fade_direction_up)) {
                // UP: sec1 (bottom stairs) → sec2+3 (platform) → sec4 (top)
                if (progress < sec2_start) {
                  for (uint16_t i = 0; i < group_size && (progress + i) < sec2_start; i++)
                    it[progress + i] = target;
                  progress += group_size;
                  if (progress >= sec1_size) progress = sec2_start;
                }
                else if (progress < sec4_start) {
                  for (uint16_t i = 0; i < sec23_group_size && (progress + i) < sec4_start; i++)
                    it[progress + i] = plat_target;
                  progress += sec23_group_size;
                  if (progress >= sec4_start) progress = sec4_start;
                }
                else {
                  for (uint16_t i = 0; i < group_size && (progress + i) < it.size(); i++)
                    it[progress + i] = target;
                  progress += group_size;
                }
              } else {
                // DOWN: sec4 (top) → sec2+3 (platform) → sec1 (bottom stairs)
                if (progress < sec4_size) {
                  uint16_t step = progress / group_size;
                  uint16_t start = sec4_start + sec4_size - ((step + 1) * group_size);
                  if (start < sec4_start) start = sec4_start;
                  for (uint16_t i = 0; i < group_size && (start + i) < it.size(); i++)
                    it[start + i] = target;
                  progress += group_size;
                }
                else if (progress < sec4_size + sec23_size) {
                  uint16_t adj = progress - sec4_size;
                  uint16_t start = sec2_start + sec23_size - (((adj / sec23_group_size) + 1) * sec23_group_size);
                  if (start < sec2_start) start = sec2_start;
                  for (uint16_t i = 0; i < sec23_group_size && (start + i) < sec4_start; i++)
                    it[start + i] = plat_target;
                  progress += sec23_group_size;
                }
                else {
                  uint16_t adj = progress - sec4_size - sec23_size;
                  uint16_t start = sec1_start + sec1_size - (((adj / group_size) + 1) * group_size);
                  if (start < sec1_start) start = sec1_start;
                  for (uint16_t i = 0; i < group_size && (start + i) < sec2_start; i++)
                    it[start + i] = target;
                  progress += group_size;
                }
              }
              effect_complete = false;
            } else {
              effect_complete = true;
            }

            id(effect_finished) = effect_complete;
