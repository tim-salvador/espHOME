      - addressable_lambda:
          name: "Fade on DOWN"
          update_interval: 15ms
          lambda: |-
            static uint16_t progress = 0;
            static bool effect_complete = false;
            static uint8_t frame_skip = 0;
            // Read color dynamically so preset changes take effect immediately
            ESPHSVColor mColor = ESPHSVColor(id(preset_h), id(preset_s), id(preset_v));

            if (initial_run) {
              progress = 0; effect_complete = false; frame_skip = 0;
              it.all() = Color::BLACK;
              return;
            }
            if (++frame_skip < id(effect_speed)) return;
            frame_skip = 0;

            if (progress < it.size()) {
              it[it.size() - progress - 1] = mColor;
              progress++;
              effect_complete = false;
            } else {
              effect_complete = true;
            }
            id(effect_finished) = effect_complete;

