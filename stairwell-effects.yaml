# ==============================================================
# Stairwell Effects - ESPHome Configuration
# Version 2.0
#
# Changes from v1:
#   - FIXED: All time globals changed from `long` to `uint32_t`
#             (prevents millis() rollover bugs at ~25 day uptime)
#   - FIXED: on_release wait_until(is_off) was a no-op; replaced
#             with configurable fade_off_delay_ms
#   - FIXED: system_state = 1 after up fade-off was wrong; now 0
#   - FIXED: Easter eggs can now overlap; added special_effect_active
#             mutex to prevent simultaneous triggering
#   - CHANGED: Removed up_sequence_active and down_sequence_active
#               booleans; all state now unified into system_state
#               (0=idle, 1=up_active, 2=down_active)
#   - CHANGED: Removed redundant light_state global; system_state==0
#               now means idle/off
#   - NEW: Color preset select entity (Warm White, Cool Blue,
#           Sunset Orange, Forest Green, Purple Haze, Custom)
#   - NEW: Platform color preset select (section 2+3 color)
#   - NEW: Custom color sliders (Hue, Saturation, Brightness)
#   - NEW: Effect speed control (1-5, runtime frame-skip)
#   - NEW: Illuminance gating switch + threshold number
#   - NEW: Configurable light timeout (HA number entity)
#   - NEW: Configurable fade-off delay (HA number entity)
#   - NEW: Configurable dwell time after fade-off (HA number entity)
#   - NOTE: GPIO0 is the ESP8266 boot pin. DHT11 on GPIO0 risks
#            pulling it low at power-on and entering flash mode.
#            Consider moving to a safe pin with hardware changes.
# ==============================================================

esphome:
  name: stairwell-effects
  friendly_name: stairwell_effects
  on_boot:
    priority: -10
    then:
      - light.turn_off: stair_light
      - lambda: |
          id(system_state) = 0;
          id(effect_finished) = false;
          id(last_trigger_time) = 0;
          id(last_pir) = 0;
          id(disco_mode_active) = false;
          id(disco_trigger_count) = 0;
          id(last_disco_trigger_time) = 0;
          id(knock_count) = 0;
          id(last_knock_time) = 0;
          id(both_pir_start_time) = 0;
          id(special_effect_active) = false;

sun:
  latitude: 41.9472
  longitude: 87.7468

time:
  - platform: sntp
    timezone: CST6CDT,M3.2.0,M11.1.0

esp8266:
  board: esp01_1m

logger:
  # level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Stairwell-Effects"
    password: !secret sw_effect_ap_pass

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret sw_effect_ota

web_server:
  version: 3

# ==============================================================
# GLOBALS
# ==============================================================
globals:
  # ---- State Tracking ----
  - id: system_state
    type: int
    initial_value: '0'
    # 0 = idle, 1 = up_active, 2 = down_active
  - id: last_pir
    type: int
    initial_value: '0'
    # 0 = none, 1 = lower PIR, 2 = upper PIR
  - id: progress
    type: int
    restore_value: no
    initial_value: '0'
  - id: effect_finished
    type: bool
    initial_value: 'false'
  - id: fade_direction_up
    type: bool
    initial_value: 'true'
  - id: fade_on
    type: bool
    initial_value: 'true'
  - id: special_effect_active   # Mutex: prevents simultaneous easter eggs
    type: bool
    initial_value: 'false'

  # ---- Time Tracking (FIXED: uint32_t prevents millis() rollover at ~25 days) ----
  - id: last_trigger_time
    type: uint32_t
    initial_value: '0'
  - id: last_pir_cleared_time
    type: uint32_t
    initial_value: '0'
  - id: last_disco_trigger_time
    type: uint32_t
    initial_value: '0'
  - id: last_knock_time
    type: uint32_t
    initial_value: '0'
  - id: both_pir_start_time
    type: uint32_t
    initial_value: '0'

  # ---- LED Layout ----
  - id: led_gap_size
    type: int
    restore_value: yes
    initial_value: '5'
  - id: led_group_size
    type: int
    restore_value: yes
    initial_value: '2'
  - id: led_platform_group_size
    type: int
    restore_value: yes
    initial_value: '9'   # Must divide evenly into 36 (sec 2+3 size)

  # ---- Easter Egg State ----
  - id: disco_trigger_count
    type: int
    initial_value: '0'
  - id: disco_mode_active
    type: bool
    initial_value: 'false'
  - id: knock_count
    type: int
    initial_value: '0'

  # ---- Color Preset Globals ----
  # All effects read from these; updated by select entity actions
  - id: preset_h
    type: uint8_t
    restore_value: yes
    initial_value: '30'    # Warm White hue
  - id: preset_s
    type: uint8_t
    restore_value: yes
    initial_value: '60'    # Warm White saturation
  - id: preset_v
    type: uint8_t
    restore_value: yes
    initial_value: '220'   # Warm White brightness

  # Platform section (LEDs 16-51) gets its own independent color
  - id: platform_h
    type: uint8_t
    restore_value: yes
    initial_value: '160'   # Cool Blue hue
  - id: platform_s
    type: uint8_t
    restore_value: yes
    initial_value: '255'
  - id: platform_v
    type: uint8_t
    restore_value: yes
    initial_value: '170'

  # Custom preset values (used when "Custom" selected in either select)
  - id: custom_h
    type: uint8_t
    restore_value: yes
    initial_value: '128'
  - id: custom_s
    type: uint8_t
    restore_value: yes
    initial_value: '255'
  - id: custom_v
    type: uint8_t
    restore_value: yes
    initial_value: '200'

  # ---- Runtime Tunables ----
  - id: effect_speed
    type: int
    restore_value: yes
    initial_value: '1'     # 1 = full speed, 2-5 = progressively slower
  - id: illuminance_threshold
    type: float
    restore_value: yes
    initial_value: '75.0'  # Lux below which lights trigger (when gating enabled)
  - id: illuminance_gating_enabled
    type: bool
    restore_value: yes
    initial_value: 'false' # Disabled by default; enable via HA switch
  - id: fade_off_delay_ms
    type: uint32_t
    restore_value: yes
    initial_value: '500'   # ms to wait after PIR clears before fading off
  - id: dwell_time_ms
    type: uint32_t
    restore_value: yes
    initial_value: '6000'  # ms lights stay on after fade-off effect completes
  - id: light_timeout_ms
    type: uint32_t
    restore_value: yes
    initial_value: '60000' # Safety timeout (60 seconds)

# ==============================================================
# SENSORS
# ==============================================================
sensor:
  - platform: template
    name: "System State"
    id: system_state_sensor
    update_interval: 1s
    lambda: 'return id(system_state);'
    unit_of_measurement: ""
    icon: "mdi:state-machine"

  - platform: template
    name: "Last PIR Triggered"
    id: last_pir_sensor
    update_interval: 1s
    lambda: 'return id(last_pir);'
    unit_of_measurement: ""
    icon: "mdi:motion-sensor"

  # WARNING: GPIO0 is the ESP8266 boot pin. If DHT11 pulls it LOW
  # at power-on, the device enters flash mode and won't boot.
  # Hardware fix: move DHT11 to GPIO3 (RX) and adjust below.
  - platform: dht
    model: DHT11
    pin: GPIO0
    temperature:
      name: "Stair Light Enclosure Temperature"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
        - offset: 8.0
      unit_of_measurement: "°F"
    humidity:
      name: "Stair Light Enclosure Humidity"
    update_interval: 60s

  - platform: homeassistant
    id: hue_illuminance
    entity_id: sensor.hue_motion_sensor_1_illuminance
    internal: true

text_sensor:
  - platform: template
    name: "Light Status"
    id: light_status_text
    lambda: |-
      float illuminance = id(hue_illuminance).state;
      std::string status;
      if (illuminance > 90.0) {
        status = "way too sunny";
      } else if (illuminance > 70.0) {
        status = "light is on";
      } else {
        status = "light is off";
      }
      return {to_string(illuminance) + " lux (" + status + ")"};

# ==============================================================
# COLOR PRESET SELECTS
# Choose named color for stair sections. Updates preset globals
# which all effects read dynamically on each frame.
# ==============================================================
select:
  - platform: template
    name: "Stair Color Preset"
    id: color_preset_select
    options:
      - "Warm White"
      - "Cool Blue"
      - "Sunset Orange"
      - "Forest Green"
      - "Purple Haze"
      - "Custom"
    initial_option: "Warm White"
    restore_value: true
    optimistic: true
    set_action:
      - lambda: |-
          if (x == "Warm White") {
            id(preset_h) = 30;  id(preset_s) = 60;  id(preset_v) = 220;
          } else if (x == "Cool Blue") {
            id(preset_h) = 160; id(preset_s) = 200; id(preset_v) = 200;
          } else if (x == "Sunset Orange") {
            id(preset_h) = 15;  id(preset_s) = 240; id(preset_v) = 200;
          } else if (x == "Forest Green") {
            id(preset_h) = 95;  id(preset_s) = 200; id(preset_v) = 150;
          } else if (x == "Purple Haze") {
            id(preset_h) = 200; id(preset_s) = 220; id(preset_v) = 180;
          } else {
            // Custom: pull from the custom H/S/V number sliders
            id(preset_h) = id(custom_h);
            id(preset_s) = id(custom_s);
            id(preset_v) = id(custom_v);
          }

  - platform: template
    name: "Platform Color Preset"
    id: platform_preset_select
    options:
      - "Warm White"
      - "Cool Blue"
      - "Sunset Orange"
      - "Forest Green"
      - "Purple Haze"
      - "Match Primary"
      - "Custom"
    initial_option: "Cool Blue"
    restore_value: true
    optimistic: true
    set_action:
      - lambda: |-
          if (x == "Warm White") {
            id(platform_h) = 30;  id(platform_s) = 60;  id(platform_v) = 220;
          } else if (x == "Cool Blue") {
            id(platform_h) = 160; id(platform_s) = 255; id(platform_v) = 170;
          } else if (x == "Sunset Orange") {
            id(platform_h) = 15;  id(platform_s) = 240; id(platform_v) = 200;
          } else if (x == "Forest Green") {
            id(platform_h) = 95;  id(platform_s) = 200; id(platform_v) = 150;
          } else if (x == "Purple Haze") {
            id(platform_h) = 200; id(platform_s) = 220; id(platform_v) = 180;
          } else if (x == "Match Primary") {
            // Sync platform color to current stair preset
            id(platform_h) = id(preset_h);
            id(platform_s) = id(preset_s);
            id(platform_v) = id(preset_v);
          } else {
            id(platform_h) = id(custom_h);
            id(platform_s) = id(custom_s);
            id(platform_v) = id(custom_v);
          }

# ==============================================================
# NUMBER ENTITIES
# All tunables exposed to HA and the built-in web UI
# ==============================================================
number:
  - platform: template
    name: "LED Group Size"
    id: led_group_size_number
    min_value: 1
    max_value: 20
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(led_group_size) = (int)x;'

  - platform: template
    name: "LED Platform Group Size"
    id: led_platform_group_size_number
    min_value: 1
    max_value: 36
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(led_platform_group_size) = (int)x;'

  # --- Custom color sliders (active when "Custom" preset selected) ---
  - platform: template
    name: "Custom Color Hue"
    id: custom_hue_number
    min_value: 0
    max_value: 255
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(custom_h) = (uint8_t)x;'

  - platform: template
    name: "Custom Color Saturation"
    id: custom_sat_number
    min_value: 0
    max_value: 255
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(custom_s) = (uint8_t)x;'

  - platform: template
    name: "Custom Color Brightness"
    id: custom_val_number
    min_value: 0
    max_value: 255
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(custom_v) = (uint8_t)x;'

  # --- Effect speed: 1 = full speed, each step up skips one extra frame ---
  - platform: template
    name: "Effect Speed (1=fast 5=slow)"
    id: effect_speed_number
    min_value: 1
    max_value: 5
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(effect_speed) = (int)x;'

  # --- Illuminance threshold in lux ---
  - platform: template
    name: "Illuminance Threshold (lux)"
    id: illuminance_threshold_number
    min_value: 0
    max_value: 500
    step: 5
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(illuminance_threshold) = x;'

  # --- Safety timeout before auto-off ---
  - platform: template
    name: "Light Timeout (seconds)"
    id: light_timeout_number
    min_value: 30
    max_value: 300
    step: 10
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(light_timeout_ms) = (uint32_t)(x * 1000);'

  # --- Delay after PIR clears before fade-off starts ---
  - platform: template
    name: "Fade Off Delay (ms)"
    id: fade_off_delay_number
    min_value: 0
    max_value: 5000
    step: 100
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(fade_off_delay_ms) = (uint32_t)x;'

  # --- How long lights stay on after fade-off effect completes ---
  - platform: template
    name: "Dwell Time (seconds)"
    id: dwell_time_number
    min_value: 0
    max_value: 30
    step: 1
    restore_value: yes
    optimistic: true
    set_action:
      - lambda: 'id(dwell_time_ms) = (uint32_t)(x * 1000);'

# ==============================================================
# SWITCH: Illuminance Gating
# When ON, PIR triggers only fire when lux < illuminance_threshold
# Useful to prevent lights activating in daylight
# ==============================================================
switch:
  - platform: template
    name: "Illuminance Gating"
    id: illuminance_gating_switch
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      - lambda: 'id(illuminance_gating_enabled) = true;'
    turn_off_action:
      - lambda: 'id(illuminance_gating_enabled) = false;'

output:
  - platform: esp8266_pwm
    id: storage_output
    pin: GPIO2

# ==============================================================
# BINARY SENSORS
# ==============================================================
binary_sensor:
  - platform: gpio
    pin:
      number: 13
    name: "PIR Sensor (Storage)"
    id: storage_pir_sensor
    device_class: motion
    on_press:
      - light.turn_on: Storage_light
    on_release:
      - light.turn_off: Storage_light

  # ---- Upper PIR: Person walking DOWN the stairs ----
  - platform: gpio
    pin:
      number: 12
    name: "PIR Sensor (Upper)"
    id: upper_pir_sensor
    filters:
      - delayed_on: 80ms
      - delayed_off: 100ms
    device_class: motion
    on_press:
      then:
        # Easter Egg: Disco Mode
        # Trigger both PIRs simultaneously 3x within 5 seconds
        # CHANGE: Added special_effect_active mutex check
        - lambda: |
            if (id(lower_pir_sensor).state && !id(special_effect_active)) {
              if (millis() - id(last_disco_trigger_time) < 5000) {
                id(disco_trigger_count)++;
              } else {
                id(disco_trigger_count) = 1;
              }
              id(last_disco_trigger_time) = millis();
              if (id(disco_trigger_count) >= 3 && !id(disco_mode_active)) {
                id(disco_mode_active) = true;
                id(special_effect_active) = true;
                id(stair_light).turn_on().set_effect("Disco Mode");
              }
            }

        # Trigger: Initial down-fade when system is idle
        # CHANGE: system_state == 0 replaces the (!up && !down) || (!up && light==0) combo
        # NEW: Illuminance gating check (bypassed if switch is off)
        - if:
            condition:
              lambda: |-
                bool state_ok = (id(system_state) == 0);
                bool light_ok = !id(illuminance_gating_enabled) ||
                                (id(hue_illuminance).state < id(illuminance_threshold));
                return state_ok && light_ok;
            then:
              - lambda: |
                  id(fade_direction_up) = false;
                  id(fade_on) = true;
              - light.turn_on:
                  id: stair_light
                  effect: "Fade Control V2"
              - wait_until:
                  condition:
                    lambda: 'return id(effect_finished);'
              - lambda: |
                  id(system_state) = 2;   // down_active
                  id(effect_finished) = false;
                  id(last_trigger_time) = millis();
                  id(last_pir) = 2;

        # Trigger: Person turned around halfway — fade off going back up
        # CHANGE: system_state == 2 replaces down_sequence_active + light_state check
        - if:
            condition:
              lambda: 'return (id(effect_finished) && id(last_pir) == 2 && id(system_state) == 2);'
            then:
              - light.turn_on:
                  id: stair_light
                  effect: "Group Fade off UP"
              - wait_until:
                  condition:
                    lambda: 'return id(effect_finished);'
              - lambda: |
                  id(system_state) = 0;
                  id(effect_finished) = false;
                  id(last_trigger_time) = 0;
                  id(last_pir) = 0;

    on_release:
      then:
        - lambda: 'id(last_pir_cleared_time) = millis();'
        # Turn off after person has gone all the way up
        # CHANGE: system_state == 1 replaces (up_active && !down_active)
        # FIX: Removed useless wait_until(is_off) — sensor is already off
        #      in on_release. Replaced with configurable fade_off_delay_ms.
        - if:
            condition:
              lambda: 'return id(system_state) == 1;'
            then:
              - delay: !lambda 'return id(fade_off_delay_ms);'
              - light.turn_on:
                  id: stair_light
                  effect: "Group Fade off UP"
              - wait_until:
                  condition:
                    lambda: 'return id(effect_finished);'
              - lambda: |
                  id(system_state) = 0;   // FIXED: was incorrectly set to 1 in v1
                  id(effect_finished) = false;
                  id(last_pir_cleared_time) = 0;
                  id(last_trigger_time) = 0;
              - delay: !lambda 'return id(dwell_time_ms);'
              - light.turn_off:
                  id: stair_light

  # ---- Lower PIR: Person walking UP the stairs ----
  - platform: gpio
    pin:
      number: 14
    name: "PIR Sensor (Lower)"
    id: lower_pir_sensor
    device_class: motion
    filters:
      - delayed_on: 80ms
      - delayed_off: 200ms
    on_press:
      then:
        # Easter Egg: Disco Mode (same logic as upper PIR)
        # CHANGE: Added special_effect_active mutex check
        - lambda: |
            if (id(upper_pir_sensor).state && !id(special_effect_active)) {
              if (millis() - id(last_disco_trigger_time) < 5000) {
                id(disco_trigger_count)++;
              } else {
                id(disco_trigger_count) = 1;
              }
              id(last_disco_trigger_time) = millis();
              if (id(disco_trigger_count) >= 3 && !id(disco_mode_active)) {
                id(disco_mode_active) = true;
                id(special_effect_active) = true;
                id(stair_light).turn_on().set_effect("Disco Mode");
              }
            }

        # Easter Egg: Secret Knock (Fire Flicker)
        # Trigger lower PIR 5 times within 3 seconds
        # CHANGE: Added special_effect_active mutex check
        - lambda: |
            if (!id(special_effect_active)) {
              if (millis() - id(last_knock_time) < 3000) {
                id(knock_count)++;
              } else {
                id(knock_count) = 1;
              }
              id(last_knock_time) = millis();
              if (id(knock_count) >= 5) {
                id(special_effect_active) = true;
                id(stair_light).turn_on().set_effect("Fire Flicker");
                id(knock_count) = 0;
              }
            }

        # Trigger: Initial up-fade when system is idle
        # CHANGE: system_state == 0 replaces the (!up && !down) || (!down && light==0) combo
        # NEW: Illuminance gating check
        - if:
            condition:
              lambda: |-
                bool state_ok = (id(system_state) == 0);
                bool light_ok = !id(illuminance_gating_enabled) ||
                                (id(hue_illuminance).state < id(illuminance_threshold));
                return state_ok && light_ok;
            then:
              - lambda: |
                  id(fade_direction_up) = true;
                  id(fade_on) = true;
              - light.turn_on:
                  id: stair_light
                  effect: "Fade Control V2"
              - wait_until:
                  condition:
                    lambda: 'return id(effect_finished);'
              - lambda: |
                  id(system_state) = 1;   // up_active
                  id(effect_finished) = false;
                  id(last_trigger_time) = millis();
                  id(last_pir) = 1;

        # Trigger: Person turned around halfway — fade off going back down
        # CHANGE: system_state == 1 replaces up_sequence_active + light_state check
        - if:
            condition:
              lambda: 'return (id(effect_finished) && id(last_pir) == 1 && id(system_state) == 1);'
            then:
              - light.turn_on:
                  id: stair_light
                  effect: "Group Fade off Down"
              - wait_until:
                  condition:
                    lambda: 'return id(effect_finished);'
              - lambda: |
                  id(system_state) = 0;
                  id(effect_finished) = false;
                  id(last_trigger_time) = 0;
                  id(last_pir) = 0;

    on_release:
      then:
        - lambda: 'id(last_pir_cleared_time) = millis();'
        # Turn off after person has gone all the way down
        # CHANGE: system_state == 2 replaces (down_active && !up_active)
        # FIX: Replaced useless wait_until(is_off) with configurable delay
        - if:
            condition:
              lambda: 'return id(system_state) == 2;'
            then:
              - delay: !lambda 'return id(fade_off_delay_ms);'
              - light.turn_on:
                  id: stair_light
                  effect: "Group Fade off Down"
              - wait_until:
                  condition:
                    lambda: 'return id(effect_finished);'
              - lambda: |
                  id(system_state) = 0;
                  id(effect_finished) = false;
                  id(last_pir_cleared_time) = 0;
                  id(last_trigger_time) = 0;
              - delay: !lambda 'return id(dwell_time_ms);'
              - light.turn_off:
                  id: stair_light

# ==============================================================
# INTERVALS
# ==============================================================
interval:
  # Easter Egg: Moonlight Mode
  # Hold both PIRs for 10 seconds → soft blue pulse for 30s
  # CHANGE: Added special_effect_active mutex check
  - interval: 1s
    then:
      - if:
          condition:
            and:
              - binary_sensor.is_on: upper_pir_sensor
              - binary_sensor.is_on: lower_pir_sensor
          then:
            - lambda: |
                if (id(both_pir_start_time) == 0) {
                  id(both_pir_start_time) = millis();
                }
                if (millis() - id(both_pir_start_time) > 10000 && !id(special_effect_active)) {
                  id(special_effect_active) = true;
                  id(stair_light).turn_on().set_effect("Moonlight");
                  id(both_pir_start_time) = 0;
                }
          else:
            - lambda: 'id(both_pir_start_time) = 0;'

  # State debug logging + timeout recovery
  # CHANGE: light_timeout_ms replaces hardcoded 60000
  - interval: 10s
    then:
      - lambda: |-
          ESP_LOGD("State", "system_state=%i  last_pir=%i  effect_finished=%s  special=%s",
            id(system_state), id(last_pir),
            id(effect_finished) ? "true" : "false",
            id(special_effect_active) ? "true" : "false");
          ESP_LOGD("State", "last_trigger=%lu ms ago  pir_cleared=%lu ms ago",
            millis() - id(last_trigger_time),
            millis() - id(last_pir_cleared_time));

      # Scenario 1: Normal timeout — lights on too long with no motion
      - if:
          condition:
            and:
              - light.is_on: stair_light
              - lambda: 'return (millis() - id(last_trigger_time)) > id(light_timeout_ms) && id(effect_finished);'
              - binary_sensor.is_off: upper_pir_sensor
              - binary_sensor.is_off: lower_pir_sensor
          then:
            - light.turn_off: stair_light
            - lambda: |
                id(system_state) = 0;
                id(effect_finished) = false;
                id(last_trigger_time) = 0;
                id(last_pir) = 0;
                id(special_effect_active) = false;
                ESP_LOGD("interval", "Light turned off by timeout");

      # Scenario 2: Stuck-state recovery — light on but state says idle
      - if:
          condition:
            and:
              - light.is_on: stair_light
              - lambda: 'return id(system_state) == 0 && id(effect_finished) && (millis() - id(last_trigger_time)) > id(light_timeout_ms);'
              - binary_sensor.is_off: upper_pir_sensor
              - binary_sensor.is_off: lower_pir_sensor
          then:
            - light.turn_off: stair_light
            - lambda: |
                id(last_trigger_time) = 0;
                id(last_pir) = 0;
                id(special_effect_active) = false;
                ESP_LOGD("interval", "Recovered from stuck state");

